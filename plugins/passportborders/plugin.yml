name: PassportBorders
version: 0.5.2
main: dk.earthliving.passportborders.PassportBordersPlugin
api-version: '1.21'
author: Codex
softdepend:
  - LuckPerms
  - Vault
commands:
  border:
    description: Shows country border information.
    usage: /border <info|list|reload|visual>
  menu:
    description: Opens the server menu.
    usage: /menu
  passport:
    description: Opens the passport menu.
    usage: /passport <list|info|buy>
permissions:
  passportborders.admin:
    description: Allows reloading PassportBorders.
    default: op
  passportborders.bypass:
    description: Allows entering all countries.
    default: op
  earthliving.border.bypass:
    description: Allows bypassing EarthLiving country border checks.
    default: op
