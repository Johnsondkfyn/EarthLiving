name: EarthLivingCore
version: 0.9.4
main: dk.earthliving.core.EarthLivingCorePlugin
api-version: '1.21'
author: Codex
description: Core foundation plugin for Earth Living systems.
softdepend:
  - PlaceholderAPI

commands:
  earthliving:
    description: Earth Living core command.
    usage: /earthliving <status|modules|reports|portal|passport|wallet|preview|event|restart|reload|earthos>
    aliases:
      - el
    permission: earthliving.command
  earthos:
    description: Opens the EarthOS menu.
    usage: /earthos
    permission: earthliving.earthos
  elbuild:
    description: Developer build generators for Earth Living structures.
    usage: /elbuild <bordercontrol> [confirm]
    permission: earthliving.build.bordercontrol

permissions:
  earthliving.command:
    description: Allows basic Earth Living commands.
    default: true
  earthliving.admin:
    description: Allows EarthLivingCore admin commands.
    default: op
  earthliving.earthos:
    description: Allows opening EarthOS.
    default: true
  earthliving.verify:
    description: Allows starting the VS1 Discord verification flow.
    default: true
  earthliving.serverselect:
    description: Allows using EarthOS server selection.
    default: true
  earthliving.jobs:
    description: Allows earning simple VS2 job rewards.
    default: true
  earthliving.verified:
    description: Marks a player as verified for EarthLiving placeholders when DiscordSRV is not available.
    default: false
  earthliving.build.bordercontrol:
    description: Allows generating the developer Border Control building.
    default: op
