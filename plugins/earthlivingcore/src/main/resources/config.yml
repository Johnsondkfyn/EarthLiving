# VS1 only. Later economy/jobs/web/nations/quests should become separate EarthOS apps after the vertical slice is stable.

modules:
  earthos: true
  webportal: true
  notifications: true
  events: true
  reports: true
  passports: true
  verification: true
  wallet: true
  jobs: true
  guide: true
  discord: true

wallet:
  start-balance: 0.0
  currency-name: "EarthCoins"
  currency-symbol: "EC "

jobs:
  enabled: true
  show-reward-message: true
  cooldowns:
    mining: 3
    farming: 3
    fishing: 5
  messages:
    reward: "&a+{amount} from {job}. Balance: {balance}"
  rewards:
    mining:
      blocks:
        STONE: 0.10
        COAL_ORE: 0.75
        IRON_ORE: 1.25
        COPPER_ORE: 0.80
        GOLD_ORE: 2.00
        DIAMOND_ORE: 5.00
        DEEPSLATE_COAL_ORE: 0.75
        DEEPSLATE_IRON_ORE: 1.25
        DEEPSLATE_COPPER_ORE: 0.80
        DEEPSLATE_GOLD_ORE: 2.00
        DEEPSLATE_DIAMOND_ORE: 5.00
    farming:
      blocks:
        WHEAT: 0.35
        CARROTS: 0.35
        POTATOES: 0.35
        BEETROOTS: 0.35
    fishing:
      default: 1.00

guide:
  steps:
    - "&61. Verify Discord &7from EarthOS -> Discord Verification."
    - "&62. Check Passport &7so your identity record exists."
    - "&63. Use Servers &7to move between Hub and Main."
    - "&64. Earn first coins &7by mining, farming or fishing."
    - "&65. Open Wallet &7to see your current balance."
    - "&8TODO VS3: deeper tutorial, quests, shops and transport."

webportal:
  enabled: true
  export-interval-seconds: 30
  link-code-minutes: 10
  public-server-name: "Earth Living Main"
  phase: "private-test"
  max-players: 20
  map-status: "foundation-live"

tab:
  current-server-name: "Earth Living"

discord:
  discordsrv:
    enabled: true
  events:
    default-message: "A random Earth Living event has started."
    minecraft-format: "&6[Event] &f{message}"
    discord-format: "**Random event started**\n{message}"
  restart:
    default-reason: "Server maintenance"
    warning-seconds:
      - 600
      - 300
      - 180
      - 60
      - 30
      - 10
    minecraft-format: "&cRestart in &f{time}&c: &7{reason}"
    discord-format: "**Restart in {time}**\n{reason}"
    now-minecraft-format: "&cRestarting now: &7{reason}"
    now-discord-format: "**Restarting now**\n{reason}"
    cancelled-format: "**Restart cancelled**"
    execute-command:
      enabled: false
      command: "restart"
  report-notifications:
    enabled: false
    webhook-url: ""
    discordsrv:
      enabled: true
      channel: "staff"
  report-import:
    enabled: true
    channel-id: "1505977375907643502"
    required-prefix: "!report"
    default-category: "bug"
    acknowledgement: "Report #{id} is now in the Earth Living Report Center."

messages:
  prefix: "&8[&6Earth Living&8] &r"
  no-verify-permission: "&cYou do not have permission to start verification."
  no-serverselect-permission: "&cYou do not have permission to switch servers."
