name: Giveaway
version: 2.0.0
main: dk.johna.giveaway.GiveawayPlugin
api-version: '1.21'
author: TheFancyWhale; updated by Johna
description: Number guessing giveaway plugin updated for Paper 1.21.4.

commands:
  giveaway:
    description: Start a number guessing giveaway.
    usage: /giveaway <number>
    aliases:
      - ga
    permission: ga.admin

permissions:
  ga.admin:
    default: op
